name: Build PDF

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: List repository files
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f

      - uses: xu-cheng/latex-action@v3
        with:
          root_file: paper.tex

      - uses: actions/upload-artifact@v4
        with:
          name: paper
          path: paper.pdf
