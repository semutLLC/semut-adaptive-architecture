name: Release PDF

on:
  release:
    types: [published]

jobs:
  upload:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: xu-cheng/latex-action@v3
        with:
          root_file: paper.tex

      - uses: softprops/action-gh-release@v2
        with:
          files: paper.pdf
